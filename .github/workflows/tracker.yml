name: Flight Tracker SAO→PAR

on:
  schedule:
    # A cada 1h — campanha ~7 dias; SerpApi+Amadeus 1 data/run (~168 buscas/semana)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      test_email:
        description: "Enviar e-mail de status (valida Resend/SMTP)"
        type: boolean
        default: false

concurrency:
  group: flight-tracker-sao-par
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flight tracker
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FLIGHT_TRACKER_STATE: ${{ vars.FLIGHT_TRACKER_STATE }}

          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPAPI_ENABLED: ${{ vars.SERPAPI_ENABLED || 'true' }}
          SERPAPI_EVERY_N_RUNS: ${{ vars.SERPAPI_EVERY_N_RUNS || '2' }}
          SERPAPI_ROUTES_PER_DATE: ${{ vars.SERPAPI_ROUTES_PER_DATE || '2' }}
          SERPAPI_EXPLORE_ENABLED: ${{ vars.SERPAPI_EXPLORE_ENABLED || 'false' }}
          ORIGIN_AIRPORTS: ${{ vars.ORIGIN_AIRPORTS || 'VCP,GRU,CGH' }}
          SCAN_DIGEST_HOURS: ${{ vars.SCAN_DIGEST_HOURS || '24' }}
          HUNT_PRICE_MIN_PCT: ${{ vars.HUNT_PRICE_MIN_PCT || '45' }}
          HUNT_PRICE_MAX_PCT: ${{ vars.HUNT_PRICE_MAX_PCT || '130' }}
          TRAVELPAYOUTS_ENABLED: ${{ vars.TRAVELPAYOUTS_ENABLED || 'true' }}

          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL || vars.ALERT_EMAIL }}
          ALERT_EMAIL_CC: ${{ vars.ALERT_EMAIL_CC }}

          TARGET_DISCOUNT_PCT: ${{ vars.TARGET_DISCOUNT_PCT || '35' }}
          YELLOW_BAND_ABOVE_GREEN_PCT: ${{ vars.YELLOW_BAND_ABOVE_GREEN_PCT || '6' }}
          GREEN_THRESHOLD_PREMIUM_PCT: ${{ vars.GREEN_THRESHOLD_PREMIUM_PCT || '10' }}
          YELLOW_THRESHOLD_PREMIUM_PCT: ${{ vars.YELLOW_THRESHOLD_PREMIUM_PCT || '10' }}
          YELLOW_RESEND_HOURS: ${{ vars.YELLOW_RESEND_HOURS || '0' }}
          YELLOW_MIN_BREAK_BRL: ${{ vars.YELLOW_MIN_BREAK_BRL || '60' }}
          GREEN_MIN_BREAK_BRL: ${{ vars.GREEN_MIN_BREAK_BRL || '80' }}
          MAX_STOPS_PREFERENCE: ${{ vars.MAX_STOPS_PREFERENCE || '2' }}
          PREFERRED_DEPARTURE_DATES: ${{ vars.PREFERRED_DEPARTURE_DATES || '2026-07-24,2026-07-25' }}
          MARKET_REFERENCE_SEED_BRL: ${{ vars.MARKET_REFERENCE_SEED_BRL || '4200' }}
          TEST_EMAIL: ${{ inputs.test_email || 'false' }}
        run: python main.py
