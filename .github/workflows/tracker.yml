name: Flight Tracker SAO⇄EU

on:
  schedule:
    # Hourly UTC — pair with cron-job.org workflow_dispatch for reliability.
    - cron: "5 * * * *"
  workflow_dispatch:
    inputs:
      test_email:
        description: "Enviar e-mail de status (valida Resend/SMTP)"
        type: boolean
        default: false

concurrency:
  group: flight-tracker-sao-eu
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flight tracker
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FLIGHT_TRACKER_STATE: ${{ vars.FLIGHT_TRACKER_STATE }}

          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPAPI_ENABLED: ${{ vars.SERPAPI_ENABLED || 'false' }}
          SERPAPI_MONTHLY_BUDGET: ${{ vars.SERPAPI_MONTHLY_BUDGET || '250' }}
          SERPAPI_DAILY_SOFT_CAP: ${{ vars.SERPAPI_DAILY_SOFT_CAP || '8' }}
          SERPAPI_DEALS_PER_DAY: ${{ vars.SERPAPI_DEALS_PER_DAY || '2' }}
          SERPAPI_EXPLORE_ENABLED: ${{ vars.SERPAPI_EXPLORE_ENABLED || 'false' }}
          MD_RSS_ENABLED: ${{ vars.MD_RSS_ENABLED || 'true' }}

          TRIP_TYPE: ${{ vars.TRIP_TYPE || 'roundtrip' }}
          HORIZON_MONTHS: ${{ vars.HORIZON_MONTHS || '6' }}
          TRIP_LENGTH_MIN: ${{ vars.TRIP_LENGTH_MIN || '7' }}
          TRIP_LENGTH_MAX: ${{ vars.TRIP_LENGTH_MAX || '14' }}
          ORIGIN_AIRPORTS: ${{ vars.ORIGIN_AIRPORTS || 'GRU,VCP' }}
          DESTINATION_CITIES: ${{ vars.DESTINATION_CITIES || 'PAR,MAD,LYS,NCE,MRS,BCN' }}
          SCAN_DIGEST_HOURS: ${{ vars.SCAN_DIGEST_HOURS || '24' }}
          HUNT_PRICE_MIN_PCT: ${{ vars.HUNT_PRICE_MIN_PCT || '40' }}
          HUNT_PRICE_MAX_PCT: ${{ vars.HUNT_PRICE_MAX_PCT || '110' }}
          TRAVELPAYOUTS_ENABLED: ${{ vars.TRAVELPAYOUTS_ENABLED || 'true' }}

          RARE_DISCOUNT_PCT: ${{ vars.RARE_DISCOUNT_PCT || '40' }}
          GOOD_DISCOUNT_PCT: ${{ vars.GOOD_DISCOUNT_PCT || '25' }}
          MAX_ALERT_PRICE_BRL: ${{ vars.MAX_ALERT_PRICE_BRL || '3500' }}
          MARKET_REFERENCE_SEED_BRL: ${{ vars.MARKET_REFERENCE_SEED_BRL || '4500' }}
          RARE_MIN_BREAK_BRL: ${{ vars.RARE_MIN_BREAK_BRL || '80' }}
          GOOD_MIN_BREAK_BRL: ${{ vars.GOOD_MIN_BREAK_BRL || '60' }}

          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL || vars.ALERT_EMAIL }}
          ALERT_EMAIL_CC: ${{ vars.ALERT_EMAIL_CC }}

          TEST_EMAIL: ${{ inputs.test_email || 'false' }}
          PYTHONPATH: .
        run: python main.py
